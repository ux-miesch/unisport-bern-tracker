name: UniBE Crowd Monitor Crawler

on:
  schedule:
    # Alle 10 Minuten, Mo-Sa 07:00-22:00 Uhr (UTC+1 = UTC-1h)
    # GitHub Actions minimum: alle 5 Minuten
    # Gym-Öffnungszeiten: Mo-Fr 07-22, Sa 08-17, So 09-17
    - cron: '0,10,20,30,40,50 6-20 * * 1-5'   # Mo-Fr 07-21 Uhr (CH-Zeit)
    - cron: '0,10,20,30,40,50 7-16 * * 6'      # Sa 08-17 Uhr
    - cron: '0,10,20,30,40,50 8-16 * * 0'      # So 09-17 Uhr
  workflow_dispatch:  # Manueller Start möglich

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Zum Committen der CSV

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Crawler
        run: python crawler.py

      - name: Commit & Push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crowd_data.csv
          git diff --staged --quiet || git commit -m "data: crowd update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
