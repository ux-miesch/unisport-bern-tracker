name: UniBE Crowd Monitor Crawler

on:
  schedule:
    - cron: '0,10,20,30,40,50 6-20 * * 1-5'
    - cron: '0,10,20,30,40,50 7-16 * * 6'
    - cron: '0,10,20,30,40,50 8-16 * * 0'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Crawler
        run: python crawler.py

      - name: Show crawler output
        run: cat crowd_data.csv || echo "Datei nicht vorhanden"

      - name: Commit & Push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f crowd_data.csv ]; then
            echo "crowd_data.csv nicht gefunden - Crawler hatte einen Fehler"
            exit 1
          fi
          git add crowd_data.csv
          git diff --staged --quiet || git commit -m "data: crowd update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
