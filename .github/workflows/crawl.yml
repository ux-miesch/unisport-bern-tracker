name: UniBE Crowd Monitor Crawler

on:
  schedule:
    - cron: '0,10,20,30,40,50 6-20 * * 1-5'
    - cron: '0,10,20,30,40,50 7-16 * * 6'
    - cron: '0,10,20,30,40,50 8-16 * * 0'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Debug HTML
        run: |
          curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/123.0.0.0 Safari/537.36" \
            "https://sport.unibe.ch/sportangebot/fitnessraeume/index_ger.html" \
            | grep -i "go-stop\|ajax-updatable\|von 80\|von 40" || echo "NICHTS GEFUNDEN"

      - name: Run Crawler
        run: python crawler.py

      - name: Commit & Push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "Keine Änderungen" && exit 0
          git commit -m "data: crowd update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
