name: UniBE Crowd Monitor Crawler

on:
  schedule:
    # Mo-Fr: 07:00-22:00 Uhr CH (= 05:00-20:00 UTC+2)
    # Erste Messung 05:00 UTC = 07:00 CH, letzte 20:00 UTC = 22:00 CH
    - cron: '0,10,20,30,40,50 5-20 * * 1-5'

    # Sa: 08:00-17:00 Uhr CH (= 06:00-15:00 UTC+2)
    - cron: '0,10,20,30,40,50 6-15 * * 6'

    # So: 09:00-17:00 Uhr CH (= 07:00-15:00 UTC+2)
    - cron: '0,10,20,30,40,50 7-15 * * 0'

  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Crawler
        run: python crawler.py

      - name: Commit & Push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "Keine Änderungen" && exit 0
          git commit -m "data: crowd update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
