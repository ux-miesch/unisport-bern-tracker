name: UniBE Crowd Monitor Crawler

on:
  schedule:
    - cron: '7,22,37,52 5-20 * * 1-5'
    - cron: '7,22,37,52 6-15 * * 6'
    - cron: '7,22,37,52 7-15 * * 0'
  workflow_dispatch:

concurrency:
  group: crowd-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TRIGGER: ${{ github.event_name }}
      RUN_ID: ${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run crawler
        run: python crawler.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add crowd_data.csv

          if git diff --staged --quiet; then
            echo "Keine Aenderungen in crowd_data.csv"
            exit 0
          fi

          git commit -m "data: crowd update (${TRIGGER}) $(date -u '+%Y-%m-%d %H:%M') UTC"

          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "Push-Versuch ${attempt} fehlgeschlagen, neuer Versuch..."
            sleep 5
          done
